<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Protocol Drill — Paramedic III Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     TOKEN SYSTEM — "Field Card"
     Grounded in the physical artifact this replaces: a tabbed
     EMS protocol binder / laminated drug-dose card. Paper-white
     base for legibility, ink-black text, a clinical red for
     action items, deep teal for wayfinding/category tabs.
  ============================================================ */
  :root{
    --paper: #f8f5ef;
    --paper-raised: #ffffff;
    --card-line: #ded6c4;
    --card-line-soft: #ebe5d6;
    --ink: #211f1c;
    --ink-soft: #5c5650;
    --ink-faint: #766d61;

    --red: #9a1f1f;
    --red-deep: #7a1717;
    --red-tint: #f6e4e1;
    --red-tint-line: #e8c3bd;

    --teal: #1d4d4f;
    --teal-deep: #143839;
    --teal-tint: #e2eeed;
    --teal-tint-line: #b9d4d2;

    --green: #2d6a4f;
    --green-tint: #e1efe7;
    --green-tint-line: #aed3c0;

    --amber: #7d530b;
    --amber-tint: #f6ecd9;
    --amber-tint-line: #e3c894;

    --display: 'Helvetica Neue', Arial, -apple-system, BlinkMacSystemFont, sans-serif;
    --body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;

    --radius-card: 10px;
    --radius-pill: 100px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --shadow-card: 0 1px 2px rgba(33,31,28,0.04), 0 1px 1px rgba(33,31,28,0.03);
    --shadow-raised: 0 4px 14px rgba(33,31,28,0.10), 0 1px 3px rgba(33,31,28,0.06);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  /* faint paper-grain texture */
  body::before{
    content:"";
    position: fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(33,31,28,0.025), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(33,31,28,0.02), transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  #app{ position:relative; z-index:1; max-width: 600px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  a{ color: inherit; }
  ::selection{ background: var(--red-tint-line); }

  h1,h2,h3{ font-family: var(--display); font-weight:800; margin:0; letter-spacing: -0.01em; font-stretch: condensed; }

  /* ============ TOP BAR ============ */
  .topbar{
    position: sticky; top:0; z-index:30;
    padding: calc(12px + var(--safe-top)) 18px 0 18px;
    background: var(--paper);
    border-bottom: 1px solid transparent;
  }
  .topbar-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding-bottom: 12px;
  }
  .brand{
    display:flex; align-items:baseline; gap:8px;
  }
  .brand .brand-mark{
    width:9px; height:9px; border-radius:2px; background: var(--red);
    transform: rotate(45deg); flex-shrink:0; margin-bottom:2px;
  }
  .brand-text{
    font-family: var(--display); font-weight:700; font-size:17px; letter-spacing:0.01em; color: var(--ink);
  }
  .brand-text .sub{ font-weight:500; color: var(--ink-faint); font-size:13px; margin-left:4px; }

  .icon-btn{
    background: var(--paper-raised); border: 1.5px solid var(--card-line);
    color: var(--ink-soft); border-radius: 8px;
    width: 36px; height: 36px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 16px;
    transition: border-color .15s, color .15s;
  }
  .icon-btn:hover{ border-color: var(--ink-faint); color: var(--ink); }
  .icon-btn:active{ transform: scale(0.94); }

  main{ flex:1; padding: 0 18px calc(28px + var(--safe-bottom)) 18px; }

  /* ============ HOME VIEW ============ */
  .hero{ padding: 16px 0 18px 0; border-bottom: 1px solid var(--card-line); margin-bottom: 18px; }
  .hero h1{ font-size: 26px; line-height:1.15; color: var(--ink); }
  .hero p{ margin: 6px 0 0 0; color: var(--ink-soft); font-size: 14.5px; line-height:1.5; max-width: 30em; }

  .stats-row{ display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin-bottom: 18px; }
  .stat-box{
    background: var(--paper-raised); border:1px solid var(--card-line); border-radius: var(--radius-card);
    padding: 12px 10px; text-align:center; box-shadow: var(--shadow-card);
  }
  .stat-box .num{ font-family: var(--display); font-size:24px; font-weight:700; color: var(--ink); line-height:1; }
  .stat-box .lbl{ font-size:10.5px; color: var(--ink-faint); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; font-weight:600; }
  .stat-box.accent .num{ color: var(--red); }

  .blind-cta{
    display:flex; align-items:center; gap:12px;
    width:100%; text-align:left; cursor:pointer;
    background: var(--teal); color:#fff; border:none; border-radius: var(--radius-card);
    padding: 14px 16px; margin-bottom: 20px;
    box-shadow: var(--shadow-card);
    transition: transform .12s, box-shadow .12s;
  }
  .blind-cta:active{ transform: scale(0.985); }
  .blind-cta .bc-icon{
    width:38px; height:38px; border-radius:8px; background: rgba(255,255,255,0.14);
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
  }
  .blind-cta .bc-text{ display:flex; flex-direction:column; gap:1px; }
  .blind-cta .bc-title{ font-family: var(--display); font-weight:700; font-size:15.5px; }
  .blind-cta .bc-sub{ font-size:12.5px; color: rgba(255,255,255,0.78); }
  .blind-cta .bc-arrow{ margin-left:auto; font-size:18px; opacity:0.7; }

  .search-row{ position:relative; margin-bottom: 22px; }
  .search-row input{
    width:100%; padding: 12px 14px 12px 38px; border-radius: 9px;
    border: 1.5px solid var(--card-line); background: var(--paper-raised); color: var(--ink);
    font-size: 15px; font-family: var(--body);
  }
  .search-row input::placeholder{ color: var(--ink-faint); }
  .search-row input:focus{ outline:none; border-color: var(--ink-soft); }
  .search-row .search-icon{
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    color: var(--ink-faint); font-size:14px; pointer-events:none;
  }

  /* Category tabs — literal index-tab metaphor */
  .cat-block{ margin-bottom: 26px; }
  .cat-tab{
    display:inline-flex; align-items:center; gap:7px;
    padding: 5px 12px 5px 10px; border-radius: 6px 6px 0 0;
    margin: 0 0 -1px 0;
    font-family: var(--display); font-size: 12.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
  }
  .cat-tab .tab-count{
    font-family: var(--mono); font-weight:500; font-size:10.5px; opacity:0.75;
  }
  .cat-block-inner{
    border: 1px solid var(--card-line); border-radius: 0 8px 8px 8px;
    background: var(--paper-raised); box-shadow: var(--shadow-card);
    overflow:hidden;
  }
  .protocol-row{
    display:flex; align-items:center; gap:12px;
    padding: 13px 14px; cursor:pointer;
    border-bottom: 1px solid var(--card-line-soft);
    transition: background .12s;
  }
  .protocol-row:last-child{ border-bottom:none; }
  .protocol-row:active{ background: var(--card-line-soft); }
  .protocol-row .pr-num{
    font-family: var(--mono); font-size:11.5px; color: var(--ink-faint); width:22px; flex-shrink:0; text-align:right;
  }
  .pr-main{ flex:1; min-width:0; }
  .pr-title{ font-size:15px; font-weight:600; color: var(--ink); line-height:1.3; }
  .pr-meta{ font-size:11.5px; color: var(--ink-faint); margin-top:2px; font-family: var(--mono); }
  .pr-status{ flex-shrink:0; }
  .pr-arrow{ color: var(--ink-faint); font-size:17px; flex-shrink:0; }

  .status-chip{
    display:inline-flex; align-items:center; gap:4px;
    padding: 3px 8px; border-radius: var(--radius-pill);
    font-size: 10px; font-weight:700; font-family: var(--mono); text-transform:uppercase; letter-spacing:0.02em;
    white-space:nowrap;
  }
  .status-chip.mastered{ background: var(--green-tint); color: var(--green); border:1px solid var(--green-tint-line); }
  .status-chip.attempted{ background: var(--amber-tint); color: var(--amber); border:1px solid var(--amber-tint-line); }
  .status-chip.new{ background: var(--card-line-soft); color: var(--ink-faint); border:1px solid var(--card-line); }

  .empty-state{ text-align:center; color: var(--ink-soft); padding: 50px 20px; font-size:14.5px; line-height:1.6; }

  /* ============ PROTOCOL MENU VIEW ============ */
  .back-row{ display:flex; align-items:center; gap:10px; padding-bottom:12px; }
  .back-btn{
    display:flex; align-items:center; gap:5px; color: var(--ink-soft);
    font-size: 14px; font-weight:600; cursor:pointer; background:none; border:none; font-family: var(--body);
    padding: 6px 2px;
  }
  .back-btn:active{ opacity:0.6; }

  .menu-hero{ padding: 6px 0 18px 0; }
  .menu-hero .menu-cat-label{
    font-family: var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color: var(--teal); font-weight:700; margin-bottom:6px;
  }
  .menu-hero h1{ font-size:23px; color: var(--ink); }
  .menu-hero .menu-meta{ color: var(--ink-faint); font-size:13px; margin-top:5px; font-family: var(--mono); }

  .progress-card{
    background: var(--paper-raised); border:1px solid var(--card-line); border-radius: var(--radius-card);
    padding: 14px 16px; margin-bottom:16px; box-shadow: var(--shadow-card);
  }
  .progress-card .pc-label{
    font-family: var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em;
    color: var(--ink-faint); margin-bottom:10px; font-weight:600;
  }
  .progress-stats{ display:flex; gap:20px; }
  .progress-stats .pstat{ display:flex; flex-direction:column; gap:2px; }
  .progress-stats .pstat .v{ font-family: var(--display); font-size:19px; font-weight:700; color: var(--ink); }
  .progress-stats .pstat .v.best{ color: var(--green); }
  .progress-stats .pstat .k{ font-size:10.5px; color: var(--ink-faint); text-transform:uppercase; letter-spacing:0.04em; }

  .btn{
    display:flex; align-items:center; justify-content:center; gap:7px;
    width:100%; padding: 14px 18px; border-radius: 10px; border: none;
    font-size: 15.5px; font-weight:700; font-family: var(--body); cursor:pointer;
    transition: transform .08s, opacity .15s, box-shadow .15s;
    margin-bottom: 11px;
  }
  .btn:active{ transform: scale(0.98); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-primary{ background: var(--red); color:#fff; box-shadow: 0 2px 8px rgba(154,31,31,0.25); }
  .btn-primary:active{ background: var(--red-deep); }
  .btn-secondary{ background: var(--teal-tint); color: var(--teal-deep); border: 1.5px solid var(--teal-tint-line); }
  .btn-ghost{ background: transparent; color: var(--ink-soft); border: 1.5px solid var(--card-line); }
  .btn-text{ background:none; border:none; color: var(--ink-soft); font-weight:600; font-size:14px; padding:8px; }
  .btn-row{ display:flex; gap:10px; }
  .btn-row .btn{ margin-bottom:0; }

  .preview-list{ display:flex; flex-direction:column; gap:8px; }
  .preview-item{
    background: var(--paper-raised); border:1px solid var(--card-line); border-radius:9px;
    padding: 12px 14px; display:flex; gap:11px; box-shadow: var(--shadow-card);
  }
  .preview-item .pi-num{
    font-family: var(--mono); font-size:11.5px; color: var(--ink-faint); flex-shrink:0; padding-top:1px;
  }
  .preview-item .pi-text{ font-size:14px; line-height:1.5; color: var(--ink); }

  /* ============ DRILL VIEW ============ */
  .tab-track{
    display:flex; gap:3px; margin-bottom:16px;
  }
  .tab-track .tick{
    flex:1; height:5px; border-radius:3px; background: var(--card-line);
    transition: background .25s;
  }
  .tab-track .tick.done{ background: var(--green); }
  .tab-track .tick.current{ background: var(--red); }

  .drill-header{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .drill-title{ font-size:19px; color: var(--ink); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .drill-tag{
    font-family: var(--mono); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em;
    background: var(--amber-tint); color: var(--amber); border:1px solid var(--amber-tint-line);
    padding: 2px 7px; border-radius: var(--radius-pill);
  }
  .step-counter{ font-family: var(--mono); font-size:13px; color: var(--ink-faint); font-weight:600; white-space:nowrap; }

  .card{
    background: var(--paper-raised); border:1px solid var(--card-line); border-radius: var(--radius-card);
    padding: 18px 18px 17px 18px; margin-bottom: 14px; box-shadow: var(--shadow-card);
  }

  .prompt-label{
    font-family: var(--mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
    color: var(--ink-faint); margin-bottom: 11px; font-weight:700; display:flex; align-items:center; gap:6px;
  }
  .prompt-label::before{ content:'?'; display:inline-flex; align-items:center; justify-content:center;
    width:15px; height:15px; border-radius:50%; background: var(--ink-faint); color:#fff; font-size:10px; font-weight:700; }

  .walk-card{ padding: 26px 20px 24px; }
  .walk-step-text{ font-size:19px; line-height:1.5; color: var(--ink); font-weight:500; }
  .walk-hidden{ font-size:15px; line-height:1.5; color: var(--ink-faint); font-style:italic; padding: 6px 0 2px; }
  .walk-actions{ display:flex; gap:10px; margin-top:6px; }
  .walk-actions .btn{ margin-bottom:0; }
  .walk-actions .btn-primary{ flex:1; }
  .walk-actions .btn-ghost{ flex: 0 0 auto; padding-left:18px; padding-right:18px; }

  .answer-box{
    width:100%; min-height: 84px; resize:vertical;
    background: var(--paper); border: 1.5px solid var(--card-line); border-radius: 9px;
    color: var(--ink); font-size: 16px; font-family: var(--body);
    padding: 13px 14px; line-height:1.5;
  }
  .answer-box:focus{ outline:none; border-color: var(--ink-soft); background: var(--paper-raised); }
  .answer-box::placeholder{ color: var(--ink-faint); }
  .answer-box:disabled{ opacity:0.75; background: var(--card-line-soft); }

  .answer-actions{ display:flex; gap:10px; margin-top:13px; }
  .answer-actions .btn{ margin-bottom:0; }
  .answer-actions .btn-skip{ flex: 0 0 auto; padding-left:18px; padding-right:18px; }
  .answer-actions .btn-submit{ flex:1; }

  /* Feedback panel */
  .feedback{
    border-radius: var(--radius-card); padding: 16px 18px; margin-bottom:14px;
    border: 1.5px solid var(--card-line); animation: cardIn .22s ease;
  }
  @keyframes cardIn{ from{ opacity:0; transform: translateY(5px);} to{opacity:1; transform:none;} }
  .feedback.correct{ background: var(--green-tint); border-color: var(--green-tint-line); }
  .feedback.partial{ background: var(--amber-tint); border-color: var(--amber-tint-line); }
  .feedback.incorrect{ background: var(--red-tint); border-color: var(--red-tint-line); }

  .feedback-verdict{
    display:flex; align-items:center; gap:9px; font-family: var(--display); font-weight:700; font-size:16px; margin-bottom:9px;
  }
  .verdict-mark{
    width:22px; height:22px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff;
  }
  .feedback.correct .verdict-mark{ background: var(--green); }
  .feedback.correct .feedback-verdict{ color: var(--green); }
  .feedback.partial .verdict-mark{ background: var(--amber); }
  .feedback.partial .feedback-verdict{ color: var(--amber); }
  .feedback.incorrect .verdict-mark{ background: var(--red); }
  .feedback.incorrect .feedback-verdict{ color: var(--red); }

  .feedback-why{ font-size: 14px; color: var(--ink); line-height:1.55; margin-bottom: 12px; }
  .feedback-correct-step{
    background: var(--paper-raised); border: 1px solid rgba(33,31,28,0.08); border-radius: 8px; padding: 12px 14px;
    font-size: 14.5px; line-height:1.55; color: var(--ink);
  }
  .feedback-correct-step .fc-label{
    font-family: var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.05em;
    color: var(--ink-faint); display:block; margin-bottom:5px; font-weight:700;
  }
  .btn-override{
    margin: 12px 0 0 0; width:100%; font-size:13px; padding:10px 14px;
    background: var(--paper-raised); border:1.5px dashed var(--ink-faint); color: var(--ink-soft);
  }
  .btn-override:active{ background: var(--card-line-soft); }

  /* ============ SUMMARY VIEW ============ */
  .summary-hero{ text-align:center; padding: 14px 10px 6px 10px; }
  .summary-hero .sh-label{ font-family: var(--mono); font-size:11.5px; text-transform:uppercase; letter-spacing:0.07em; color: var(--ink-faint); font-weight:700; }
  .summary-hero h1{ font-size:20px; margin-top:4px; color: var(--ink); }

  .ring-wrap{ display:flex; justify-content:center; margin: 18px 0 4px 0; }
  .ring-wrap svg{ width:128px; height:128px; }
  .ring-bg{ fill:none; stroke: var(--card-line); stroke-width:9; }
  .ring-fg{ fill:none; stroke-width:9; stroke-linecap:round; transform-origin:center; transform: rotate(-90deg); transition: stroke-dashoffset .7s ease; }
  .ring-text{ font-family: var(--display); font-weight:700; }

  .summary-breakdown{ display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin: 18px 0 22px 0; }
  .sb-item{ text-align:center; padding: 11px 6px; border-radius: 9px; background: var(--paper-raised); border:1px solid var(--card-line); }
  .sb-item .v{ font-family: var(--display); font-size:21px; font-weight:700; }
  .sb-item .k{ font-size:10.5px; color: var(--ink-faint); text-transform:uppercase; letter-spacing:0.04em; margin-top:3px; font-weight:600; }
  .sb-item.ok .v{ color: var(--green); }
  .sb-item.partial .v{ color: var(--amber); }
  .sb-item.miss .v{ color: var(--red); }

  .section-divider{
    display:flex; align-items:center; gap:10px; margin: 24px 0 12px 0;
  }
  .section-divider .sd-label{
    font-family: var(--mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
    color: var(--ink-faint); font-weight:700; white-space:nowrap;
  }
  .section-divider .sd-line{ flex:1; height:1px; background: var(--card-line); }

  .review-list{ display:flex; flex-direction:column; gap:9px; }
  .review-item{
    background: var(--paper-raised); border:1px solid var(--card-line); border-radius:9px; padding:13px 15px;
    border-left: 3px solid var(--card-line);
  }
  .review-item.partial{ border-left-color: var(--amber); }
  .review-item.miss{ border-left-color: var(--red); }
  .review-item .ri-head{
    display:flex; align-items:center; gap:7px; margin-bottom:7px; font-size:12px; font-weight:700;
    font-family: var(--mono); text-transform:uppercase; letter-spacing:0.03em;
  }
  .review-item.partial .ri-head{ color: var(--amber); }
  .review-item.miss .ri-head{ color: var(--red); }
  .review-item .ri-step{ font-size: 14px; color: var(--ink); line-height:1.5; }
  .review-item .ri-step + .ri-step{ margin-top:7px; padding-top:7px; border-top:1px dashed var(--card-line); color: var(--ink-soft); }
  .review-item .ri-step strong{ font-weight:700; color: var(--ink-faint); font-size:11px; text-transform:uppercase; letter-spacing:0.03em; display:block; margin-bottom:3px; font-family: var(--mono); }

  /* ============ BLIND MODE ============ */
  .clue-list{ display:flex; flex-direction:column; gap:9px; margin-bottom: 16px; }
  .clue-item{
    background: var(--paper-raised); border:1px solid var(--card-line); border-radius:9px;
    padding: 13px 15px; font-size: 14.5px; line-height:1.5; color: var(--ink);
    display:flex; gap:11px; align-items:flex-start;
    animation: cardIn .25s ease; box-shadow: var(--shadow-card);
  }
  .clue-item .clue-num{
    font-family: var(--mono); color:#fff; background: var(--teal); border-radius:50%;
    width:20px; height:20px; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; flex-shrink:0; margin-top:1px;
  }

  .scenario-card{ background: var(--teal-tint); border: 1.5px solid var(--teal-tint-line); }
  .scenario-label{
    font-family: var(--mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase;
    color: var(--teal-deep); margin-bottom:8px; font-weight:700;
  }
  .scenario-text{ font-size: 14.5px; line-height: 1.6; color: var(--ink); }

  /* Toast */
  .toast{
    position: fixed; bottom: calc(22px + var(--safe-bottom)); left:50%; transform: translateX(-50%);

    padding: 12px 20px; border-radius: var(--radius-pill); font-size: 13.5px; font-weight:600; z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    animation: toastIn .25s ease, toastOut .25s ease 1.8s forwards;
  }
  @keyframes toastIn{ from{ opacity:0; transform: translateX(-50%) translateY(8px);} to{opacity:1; transform:translateX(-50%);} }
  @keyframes toastOut{ to{ opacity:0; } }

  .hidden{ display:none !important; }

  /* focus visibility for accessibility */
  button:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--teal); outline-offset:2px;

// MATCHING ENGINE — compares user answer to the correct step
// ============================================================

const STOPWORDS = new Set(['the','a','an','to','of','in','on','for','and','or','with','is','are','was','were','be','been',
  'at','by','as','it','this','that','these','those','if','then','may','will','shall','should','must','can',
  'patient','patients','administer','administering','administered','give','given','via','per','their','they','them',
  'once','using','use','do','not','no','before','after','into','onto','from','also','until','when','while',
  'repeat','prn','x1','1x','2x','interval','intervals','minute','minutes','min','mins','consider','perform',
  'apply','provide','assess','assessing','establish','obtain','recognize','signs','symptoms']);

// Clinical synonym groups — each word in a group is normalized to the group's first (canonical) term
const SYNONYM_GROUPS = [
  ['epinephrine','epi'],
  ['normalsaline','ns','saline','normal'],
  ['benadryl','diphenhydramine'],
  ['albuterol','ventolin'],
  ['atrovent','ipratropium'],
  ['solumedrol','methylprednisolone'],
  ['narcan','naloxone'],
  ['versed','midazolam'],
  ['fentanyl','sublimaze'],
  ['cardizem','diltiazem'],
  ['zofran','ondansetron'],
  ['lasix','furosemide'],
  ['rocephin','ceftriaxone'],
  ['cefepime','maxipime'],
  ['oxygen','o2'],
  ['twice','2x','two'],
  ['intramuscular','im'],
  ['intravenous','iv'],
  ['intraosseous','io'],
  ['bymouth','po','orally','oral'],
  ['nebulizer','neb','nebulized'],
  ['tourniquet','cat'],
  ['ekg','ecg','electrocardiogram'],
  ['cardioversion','cardiovert'],
  ['defibrillate','defibrillation','shock'],
  ['bloodpressure','bp'],
  ['heartrate','hr','pulse'],
  ['breathing','respirations','resp'],
  ['lungsounds','lungs'],
  ['hypertension','highbp','highbloodpressure'],
  ['hypotension','lowbp','lowbloodpressure'],
  ['tachycardia','fastheartrate','fasthr','fastpulse'],
  ['bradycardia','slowheartrate','slowhr','slowpulse'],
  ['rales','crackles'],
  ['orthopnea','cantbreathelyingflat'],
  ['edema','swelling','swollen'],
  ['pediatric','peds','child','children','kid','infant'],
  ['dyspnea','shortnessofbreath','sob','breathless'],
  ['diaphoretic','sweaty','sweating'],
  ['syncope','fainting','passedout','passingout'],
  ['ams','alteredmentalstatus','confused','confusion'],
  ['cyanosis','bluish'],
  ['tachypnea','fastbreathing','rapidbreathing'],
  ['bradypnea','slowbreathing'],
  ['hyperglycemia','highbloodsugar','highbgl','highglucose'],
  ['hypoglycemia','lowbloodsugar','lowbgl','lowglucose'],
  ['urticaria','hives'],
  ['emesis','vomit','vomiting','throwingup'],
  ['nrb','nonrebreather','nonrebreathermask'],
  ['bvm','bagvalvemask','bagging'],
  ['fundus','uterus']
];
const SYN_MAP = {};
SYNONYM_GROUPS.forEach(group => {
  const canon = group[0];
  group.forEach(term => { SYN_MAP[term] = canon; });
});

function normalizeWord(w){
  // collapse common multi-word phrases pre-tokenization happens in tokenize(); here just map synonyms
  return SYN_MAP[w] || w;
}

function tokenize(str){
  let s = (str||'').toLowerCase();
  // normalize a few multi-word clinical phrases into single tokens before splitting
  s = s
    .replace(/normal saline/g, 'normalsaline')
    .replace(/blood pressure/g, 'bloodpressure')
    .replace(/heart rate/g, 'heartrate')
    .replace(/lung sounds/g, 'lungsounds')
    .replace(/\bo2\s+sat\w*/g, 'spo2')
    .replace(/by\s+mouth/g, 'bymouth')
    .replace(/high\s+bp|elevated\s+bp|high\s+blood\s*pressure/g, ' hypertension ')
    .replace(/low\s+bp|low\s+blood\s*pressure/g, ' hypotension ')
    .replace(/fast\s+(heart\s*rate|hr|pulse)/g, ' tachycardia ')
    .replace(/slow\s+(heart\s*rate|hr|pulse)/g, ' bradycardia ')
    .replace(/fast\s+breathing|rapid\s+breathing/g, ' tachypnea ')
    .replace(/slow\s+breathing/g, ' bradypnea ')
    .replace(/short(ness)?\s+of\s+breath/g, ' dyspnea ')
    .replace(/passed?\s+out|passing\s+out/g, ' syncope ')
    .replace(/swollen\s+\w+|swelling/g, ' edema ')
    .replace(/throwing\s+up|threw\s+up/g, ' emesis ')
    .replace(/altered\s+mental\s+status/g, ' ams ')
    .replace(/can'?t\s+breathe\s+lying\s+(down|flat)|trouble\s+breathing\s+lying\s+(down|flat)/g, ' orthopnea ')
    .replace(/\bx\s?2\b|\b2\s?x\b|\btwo times\b|\btwice\b/g, ' 2x ')
    .replace(/(\d+)-(lead|degree|year|inch|hour|minute|second)/g, '$1 $2'); // "12-lead" -> "12 lead"
  return s
    .replace(/[°]/g, '')
    .replace(/[^a-z0-9.%/<>=+\- ]/g, ' ')
    .split(/\s+/)
    .filter(Boolean)
    .map(normalizeWord);
}

const SOFT_WORDS = new Set(['immediately','frequently','rapid','rapidly','slow','slowly','gentle','gently','possible']);

function meaningfulTokens(str){
  return tokenize(str).filter(t => !STOPWORDS.has(t) && !SOFT_WORDS.has(t) && t.length > 1);
}

// Known drug/intervention names worth checking explicitly (lowercase, canonical form after synonym mapping)
const KNOWN_DRUGS = ['epinephrine','benadryl','albuterol','atrovent','solumedrol','narcan','versed','fentanyl',
  'cardizem','zofran','lasix','rocephin','cefepime','atropine','glucagon','dextrose','aspirin','nitroglycerin',
  'magnesium','calcium','sodiumbicarbonate','sodium','bicarbonate','amiodarone','adenosine','ketamine','etomidate',
  'rocuronium','tranexamic','txa','tetracaine','oxygen','dopamine','morphine','duodote'];

function extractKeyFacts(stepText){
  const facts = { numbers: [], drugs: [] };
  const numMatches = stepText.match(/[0-9]+(\.[0-9]+)?\s*(mg\/kg|mcg\/kg|ml\/kg|g\/kg|mg|mcg|ml|mL|l|lpm|mmhg|j\/kg|j|joules|gtt|min|minutes|sec|seconds|%|degrees|mEq)/gi) || [];
  facts.numbers = numMatches.map(s => s.toLowerCase().replace(/\s+/g,''));

  const lowerTokens = tokenize(stepText);
  facts.drugs = lowerTokens.filter(t => KNOWN_DRUGS.includes(t));
  // dedupe
  facts.drugs = [...new Set(facts.drugs)];

  return facts;
}

function jaccardSimilarity(setA, setB){
  if(setA.length===0 && setB.length===0) return 1;
  const a = new Set(setA), b = new Set(setB);
  let intersection = 0;
  for(const x of a){ if(b.has(x)) intersection++; }
  const union = new Set([...a, ...b]).size;
  return union===0 ? 0 : intersection/union;
}

// Levenshtein-based fuzzy token match: counts a user token as "hit" if it closely matches any correct token
function fuzzyTokenOverlap(userTokens, correctTokens){
  let hits = 0;
  const usedCorrect = new Set();
  for(const ut of userTokens){
    let bestMatch = null, bestDist = Infinity;
    for(let i=0;i<correctTokens.length;i++){
      if(usedCorrect.has(i)) continue;
      const ct = correctTokens[i];
      if(ut === ct){ bestDist = 0; bestMatch = i; break; }
      if(Math.abs(ut.length-ct.length) > 3) continue;
      const d = levenshtein(ut, ct);
      const threshold = ct.length <= 4 ? 1 : (ct.length <= 7 ? 2 : 3);
      if(d <= threshold && d < bestDist){ bestDist = d; bestMatch = i; }
    }
    if(bestMatch !== null){ hits++; usedCorrect.add(bestMatch); }
  }
  return hits;
}

function levenshtein(a, b){
  const m = a.length, n = b.length;
  if(m===0) return n;
  if(n===0) return m;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      if(a[i-1]===b[j-1]) dp[i][j] = dp[i-1][j-1];
      else dp[i][j] = 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
    }
  }
  return dp[m][n];
}

/**
 * Evaluate a user's answer against the correct step text.
 * Returns { verdict: 'correct'|'partial'|'incorrect', score: 0-1, missedFacts: [], whyText: string }
 */
function evaluateAnswer(userAnswer, correctStep){
  const trimmed = (userAnswer||'').trim();
  if(trimmed.length === 0){
    return { verdict:'incorrect', score:0, whyText: "No answer entered — here's the correct step." };
  }

  // Strip parenthetical caveats (contraindications, cautions) from the scoring target —
  // these are warnings the reveal still shows, but shouldn't count against the user for omitting.
  const coreStep = correctStep.replace(/\((?:contraindicated|caution|note)[^)]*\)/gi, '');

  const userTokens = meaningfulTokens(trimmed);
  const correctTokens = meaningfulTokens(coreStep);

  const overlapHits = fuzzyTokenOverlap(userTokens, correctTokens);
  const coverage = correctTokens.length ? overlapHits / correctTokens.length : 0;
  const precision = userTokens.length ? overlapHits / userTokens.length : 0;

  const keyFacts = extractKeyFacts(coreStep);
  const userKeyFacts = extractKeyFacts(trimmed);
  const numberSim = jaccardSimilarity(keyFacts.numbers, userKeyFacts.numbers);
  const drugSim = jaccardSimilarity(keyFacts.drugs, userKeyFacts.drugs);

  // Weighted composite score: coverage of correct content matters most,
  // bonus weight on getting key doses/drug names right since those are clinically critical.
  let score = coverage * 0.65 + precision * 0.1;
  if(keyFacts.numbers.length > 0) score += numberSim * 0.13; else score += 0.13;
  if(keyFacts.drugs.length > 0) score += drugSim * 0.12; else score += 0.12;

  score = Math.max(0, Math.min(1, score));

  let verdict;
  if(score >= 0.5) verdict = 'correct';
  else if(score >= 0.26) verdict = 'partial';
  else verdict = 'incorrect';

  // Build a "why" explanation
  let whyParts = [];
  if(verdict === 'correct'){
    whyParts.push("Your answer captures the key action" + (keyFacts.numbers.length || keyFacts.drugs.length ? " and the critical details." : "."));
    if(keyFacts.numbers.length > 0 && numberSim < 0.99){
      whyParts.push("Double check the exact dose/number against the reveal below.");
    }
  } else if(verdict === 'partial'){
    whyParts.push("You're on the right track, but missing some important specifics.");
    if(keyFacts.drugs.length > 0 && drugSim < 0.5){
      whyParts.push("Check the medication name(s) involved.");
    }
    if(keyFacts.numbers.length > 0 && numberSim < 0.5){
      whyParts.push("Check the dose, route, or numeric threshold.");
    }
    if(coverage < 0.4){
      whyParts.push("There's also more to this step than what you wrote — see the full step below.");
    }
  } else {
    whyParts.push("This doesn't match the next step in the protocol. Review the correct step below and try to commit it to memory.");
  }

  return { verdict, score, whyText: whyParts.join(' ') };
}

// LOCAL STORAGE LAYER
// ============================================================
const STORAGE_KEY = 'protocolDrill_v1';

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { protocols: {}, totalDrills: 0 };
    const parsed = JSON.parse(raw);
    if(!parsed.protocols) parsed.protocols = {};
    if(typeof parsed.totalDrills !== 'number') parsed.totalDrills = 0;
    return parsed;
  }catch(e){
    console.warn('Could not load progress', e);
    return { protocols: {}, totalDrills: 0 };
  }
}

function saveProgress(progress){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }catch(e){
    console.warn('Could not save progress', e);
  }
}

let PROGRESS = loadProgress();

function getProtocolProgress(id){
  if(!PROGRESS.protocols[id]){
    PROGRESS.protocols[id] = { attempts: 0, bestScore: 0, lastScore: null, mastered: false, lastMissedSteps: [] };
  }
  return PROGRESS.protocols[id];
}

function recordAttempt(id, scorePct, missedStepIndices){
  const p = getProtocolProgress(id);
  p.attempts += 1;
  p.lastScore = scorePct;
  p.bestScore = Math.max(p.bestScore, scorePct);
  p.mastered = scorePct >= 90;
  p.lastMissedSteps = missedStepIndices;
  PROGRESS.totalDrills += 1;
  saveProgress(PROGRESS);
}

const ALL_PROTOCOLS = [];
PROTOCOL_DATA.categories.forEach(cat => {
  cat.protocols.forEach(p => ALL_PROTOCOLS.push(Object.assign({ category: cat.name }, p)));
});

function findProtocol(id){ return ALL_PROTOCOLS.find(p => p.id === id); }

const State = {
  view: 'home',          // home | drill | summary | walk | pharm
  activeProtocolId: null,
  practiceOnlyMissed: false,
  stepOrder: [],          // array of step indices to drill through, in order
  currentIdx: 0,          // pointer into stepOrder
  results: [],            // {stepIndex, verdict, score, userAnswer}
  revealed: false,
  searchQuery: '',
  walkIdx: 0,             // pointer for step-through recall mode
  walkRevealed: false
};

function startDrill(protocolId, opts){
  opts = opts || {};
  const proto = findProtocol(protocolId);
  if(!proto) return;
  State.activeProtocolId = protocolId;
  State.practiceOnlyMissed = !!opts.onlyMissed;
  if(opts.onlyMissed){
    const prog = getProtocolProgress(protocolId);
    State.stepOrder = (prog.lastMissedSteps && prog.lastMissedSteps.length) ?
      prog.lastMissedSteps.slice() : proto.steps.map((_,i)=>i);
  } else {
    State.stepOrder = proto.steps.map((_,i)=>i);
  }
  State.currentIdx = 0;
  State.results = [];
  State.revealed = false;
  State.view = 'drill';
  render();
}

function startWalk(protocolId){
  const proto = findProtocol(protocolId);
  if(!proto) return;
  State.activeProtocolId = protocolId;
  State.walkIdx = 0;
  State.walkRevealed = false;
  State.view = 'walk';
  render();
}

function startPharmMode(){
  State.view = 'pharm';
  render();
}

function goHome(){
  State.view = 'home';
  State.activeProtocolId = null;
  render();
}

  return div.innerHTML;

  if(verdict==='correct') return '&#10003;';
  if(verdict==='partial') return '~';
  return '&#10005;';
}
function verdictLabel(verdict){
  if(verdict==='correct') return 'Correct';
  if(verdict==='partial') return 'Partially correct';
  return 'Incorrect';

  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.parentNode.removeChild(t); }, 2100);
}

function computeHomeStats(){
  let mastered = 0, attempted = 0;
  ALL_PROTOCOLS.forEach(p => {
    const prog = PROGRESS.protocols[p.id];
    if(prog){
      if(prog.mastered) mastered++;
      else if(prog.attempts > 0) attempted++;
    }
  });
  return { mastered, attempted, total: ALL_PROTOCOLS.length, drills: PROGRESS.totalDrills };
}

function renderHome(){
  const app = document.getElementById('app');
  const stats = computeHomeStats();
  const query = State.searchQuery.toLowerCase().trim();

  let categoriesHtml = '';
  PROTOCOL_DATA.categories.forEach((cat, catIdx) => {
    const filtered = cat.protocols.filter(p => !query || p.title.toLowerCase().includes(query));
    if(filtered.length === 0) return;
    const color = catColor(catIdx);
    categoriesHtml += `<div class="cat-block">
      <div class="cat-tab" style="background:${color.bg}; color:${color.fg}; border:1px solid ${color.line}; border-bottom:none;">
        ${escapeHtml(cat.name)} <span class="tab-count">${filtered.length}</span>
      </div>
      <div class="cat-block-inner">
        ${filtered.map((p, i) => {
          const prog = PROGRESS.protocols[p.id];

function renderWalk(){
  const proto = findProtocol(State.activeProtocolId);
  const app = document.getElementById('app');
  const total = proto.steps.length;
  const idx = State.walkIdx;
  const stepText = proto.steps[idx];
  const isLast = idx + 1 >= total;
  const revealed = State.walkRevealed;

  app.innerHTML = `
    <div class="topbar">
      <div class="back-row">
        <button class="back-btn" id="btn-exit"><span>&#8249;</span> Exit</button>
      </div>
    </div>
    <main>
      ${renderTabTrack(idx, total, proto.steps.map((_,i) => i < idx))}

      <div class="drill-header">
        <div class="drill-title">${escapeHtml(proto.title)} <span class="drill-tag">Recall & Reveal</span></div>
        <div class="step-counter">${idx+1} / ${total}</div>
      </div>

      <div class="card walk-card">
        <div class="prompt-label">Step ${idx+1}</div>
        ${revealed
          ? `<div class="walk-step-text">${escapeHtml(stepText)}</div>`
          : `<div class="walk-hidden">Work out this step, then reveal it to check yourself.</div>`
        }
      </div>

      <div class="walk-actions">
        ${idx > 0 ? `<button class="btn btn-ghost" id="btn-walk-back">&#8249; Previous</button>` : ''}
        ${revealed
          ? `<button class="btn btn-primary" id="btn-walk-next">${isLast ? 'Finish' : 'Next step &#8250;'}</button>`
          : `<button class="btn btn-primary" id="btn-walk-reveal">Reveal step</button>`
        }
      </div>
    </main>
  `;

  document.getElementById('btn-exit').addEventListener('click', () => openProtocolMenu(proto.id));
  if(idx > 0){
    document.getElementById('btn-walk-back').addEventListener('click', () => {
      State.walkIdx -= 1;
      State.walkRevealed = false;
      renderWalk();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  }
  if(revealed){
    document.getElementById('btn-walk-next').addEventListener('click', () => {
      if(isLast){
        openProtocolMenu(proto.id);
      } else {
        State.walkIdx += 1;
        State.walkRevealed = false;
        renderWalk();
        window.scrollTo({top:0, behavior:'smooth'});
      }
    });
  } else {
    document.getElementById('btn-walk-reveal').addEventListener('click', () => {
      State.walkRevealed = true;
      renderWalk();
    });
  }
}

function renderTabTrack(currentIdx, total, results){
  let html = '<div class="tab-track">';
  for(let i=0;i<total;i++){
    let cls = 'tick';
    if(i < results.length && results[i]) cls += ' done';
    else if(i === currentIdx) cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderDrill(){
  const proto = findProtocol(State.activeProtocolId);
  const app = document.getElementById('app');
  const stepIdx = State.stepOrder[State.currentIdx];
  const stepText = proto.steps[stepIdx];
  const total = State.stepOrder.length;
  const onResult = State.results[State.currentIdx];

  app.innerHTML = `
    <div class="topbar">
      <div class="back-row">
        <button class="back-btn" id="btn-exit"><span>&#8249;</span> Exit drill</button>
      </div>
    </div>
    <main>
      ${renderTabTrack(State.currentIdx, total, State.results)}

      <div class="drill-header">
        <div class="drill-title">${escapeHtml(proto.title)}${State.practiceOnlyMissed ? ' <span class="drill-tag">Missed steps</span>' : ''}</div>
        <div class="step-counter">${State.currentIdx+1} / ${total}</div>
      </div>

      <div class="card">
        <div class="prompt-label">What is the next step?</div>
        <textarea class="answer-box" id="answer-input" placeholder="Type the next step in your own words&hellip;" ${onResult ? 'disabled' : ''}>${onResult ? escapeHtml(onResult.userAnswer) : ''}</textarea>
        ${!onResult ? `
          <div class="answer-actions">
            <button class="btn btn-ghost btn-skip" id="btn-skip">Skip</button>
            <button class="btn btn-primary btn-submit" id="btn-submit">Check answer</button>
          </div>
        ` : ''}
      </div>

      <div id="feedback-zone"></div>

      ${onResult ? `
        <button class="btn btn-primary" id="btn-next">
          ${State.currentIdx + 1 < total ? 'Next step &#8250;' : 'Finish drill'}
        </button>
      ` : ''}
    </main>
  `;

  document.getElementById('btn-exit').addEventListener('click', () => {
    if(confirm('Exit this drill? Progress on this attempt will be lost.')){
      openProtocolMenu(State.activeProtocolId);
    }
  });

  if(onResult){
    renderFeedback(onResult, stepText);
    document.getElementById('btn-next').addEventListener('click', advanceDrill);
  } else {
    const textarea = document.getElementById('answer-input');
    textarea.focus();
    document.getElementById('btn-submit').addEventListener('click', () => submitAnswer(stepText));
    document.getElementById('btn-skip').addEventListener('click', () => submitAnswer(stepText, true));
    textarea.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && (e.metaKey || e.ctrlKey)){
        submitAnswer(stepText);
      }
    });
  }
}

function submitAnswer(correctStep, skipped){
  const textarea = document.getElementById('answer-input');
  const userAnswer = skipped ? '' : textarea.value;
  const evalResult = skipped ?
    { verdict:'incorrect', score:0, whyText:"Step skipped — here's the correct step." } :
    evaluateAnswer(userAnswer, correctStep);

  State.results[State.currentIdx] = {
    stepIndex: State.stepOrder[State.currentIdx],
    userAnswer: userAnswer,
    verdict: evalResult.verdict,
    score: evalResult.score,
    whyText: evalResult.whyText
  };
  renderDrill();
}

function renderFeedback(result, correctStep){
  const zone = document.getElementById('feedback-zone');
  zone.innerHTML = `
    <div class="feedback ${result.verdict}">
      <div class="feedback-verdict"><span class="verdict-mark">${verdictMark(result.verdict)}</span> ${verdictLabel(result.verdict)}</div>
      <div class="feedback-why">${escapeHtml(result.whyText)}</div>
      <div class="feedback-correct-step">
        <span class="fc-label">Correct step</span>
        ${escapeHtml(correctStep)}
      </div>
      ${result.verdict !== 'correct' ? `
        <button class="btn btn-ghost btn-override" id="btn-mark-correct">Actually, I got this right &mdash; mark correct</button>
      ` : ''}
    </div>
  `;
  if(result.verdict !== 'correct'){
    document.getElementById('btn-mark-correct').addEventListener('click', markCurrentStepCorrect);
  }
}

function markCurrentStepCorrect(){
  const result = State.results[State.currentIdx];
  if(!result) return;
  result.verdict = 'correct';
  result.score = 1;
  result.whyText = 'Marked correct by you.';
  result.overridden = true;
  renderDrill();
}

function advanceDrill(){
  if(State.currentIdx + 1 < State.stepOrder.length){
    State.currentIdx += 1;
    renderDrill();
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    finishDrill();
  }
}

function finishDrill(){
  const proto = findProtocol(State.activeProtocolId);
  const total = State.results.length;
  const correctCount = State.results.filter(r=>r.verdict==='correct').length;
  const partialCount = State.results.filter(r=>r.verdict==='partial').length;
  const incorrectCount = State.results.filter(r=>r.verdict==='incorrect').length;

  const rawScore = State.results.reduce((sum,r) => sum + (r.verdict==='correct' ? 1 : r.verdict==='partial' ? 0.5 : 0), 0);
  const pct = total > 0 ? Math.round((rawScore/total)*100) : 0;

  const missedStepIndices = State.results
    .filter(r => r.verdict !== 'correct')
    .map(r => r.stepIndex);

  recordAttempt(proto.id, pct, missedStepIndices);

  State.view = 'summary';
  State.lastSummary = { pct, correctCount, partialCount, incorrectCount, total, missedStepIndices };
  render();
}

        <div class="sb-item miss"><div class="v">${s.incorrectCount}</div><div class="k">Missed</div></div>

const PharmState = {
  mode: 'adult',
  queue: [],
  cur: null,
  answered: false,
  correct: 0, wrong: 0, streak: 0, total: 0,
  refOpen: false,
  initialized: false
};

function pharmShuffle(a){
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function pharmResetSession(){
  PharmState.correct = PharmState.wrong = PharmState.streak = PharmState.total = 0;
  PharmState.queue = pharmShuffle([...PHARM_MEDS]);
  PharmState.answered = false;
  pharmLoadCard();
}

function pharmLoadCard(){
  if(!PharmState.queue.length) PharmState.queue = pharmShuffle([...PHARM_MEDS]);
  const cm = PharmState.mode === 'both' ? (Math.random() < 0.5 ? 'adult' : 'peds') : PharmState.mode;
  PharmState.cur = { med: PharmState.queue.pop(), cm };
  PharmState.answered = false;
  PharmState._lastOk = false;
  PharmState._lastPkgOk = false;
  PharmState._revealed = false;
}

function pharmGetAnswer(){
  return PharmState.cur.cm === 'adult' ? PharmState.cur.med.adult : PharmState.cur.med.peds;
}

function pharmFuzzy(user, correct){
  const n = s => s.toLowerCase().replace(/\s+/g,' ').trim();
  const u = n(user), c = n(correct);
  if(u === c || c.includes(u)) return true;
  const nums = s => s.match(/[\d.]+\s*(?:mg|mcg|g|gram|ml|meq|unit|kg|%)?(?:\/kg)?/g) || [];
  const ut = nums(u), ct = nums(c);
  if(ut.length && ct.length){
    const norm = t => t.replace(/\s/g,'');
    const cs = ct.map(norm);
    return ut.every(t => cs.some(cx => cx.includes(norm(t)) || norm(t).includes(cx)));
  }
  return false;
}

function pharmFuzzyPkg(user, correct){
  const n = s => s.toLowerCase().replace(/\s+/g,' ').trim();
  const u = n(user), c = n(correct);
  if(!u) return false;
  if(u === c || c.includes(u)) return true;
  // Extract the core concentration tokens, e.g. "6mg" "2ml" "25g" "50ml"
  const nums = s => (s.match(/[\d.]+\s*(?:mg|mcg|g|gram|grams|ml|meq|unit|units|kg|%)/g) || [])
    .map(t => t.replace(/\s/g,''));
  const ut = nums(u), ct = nums(c);
  if(ut.length && ct.length){
    // user must hit every core unit found in the correct packaging (order independent)
    return ct.every(cx => ut.some(ux => ux === cx || ux.includes(cx) || cx.includes(ux)));
  }
  return false;
}

function pharmReveal(){
  if(PharmState.answered){ pharmNext(); return; }
  PharmState.answered = true; PharmState.total++; PharmState.wrong++; PharmState.streak = 0;
  PharmState._revealed = true;
  renderPharm();
}

function pharmSkip(){
  PharmState.queue.unshift(PharmState.cur.med);
  pharmLoadCard();
  renderPharm();
}

function pharmNext(){
  PharmState._revealed = false;
  pharmLoadCard();
  renderPharm();
}

function pharmSetMode(m){
  PharmState.mode = m;
  pharmResetSession();
  renderPharm();
}

function pharmBuildRefRows(){
  return PHARM_MEDS.map(m => `
    <tr>
      <td>${escapeHtml(m.name)}</td>
      <td>${escapeHtml(m.adult)}</td>
      <td>${escapeHtml(m.peds)}</td>
      <td>${escapeHtml(m.pkg)}</td>
    </tr>
  `).join('');
}

function renderPharm(){
  if(!PharmState.initialized){
    PharmState.initialized = true;
    pharmResetSession();
  }
  const app = document.getElementById('app');
  const cur = PharmState.cur;
  const cm = cur.cm;
  const ans = pharmGetAnswer();
  const answered = PharmState.answered;
  const revealed = !!PharmState._revealed;

  const pct = PharmState.total ? Math.round((PharmState.total / (PharmState.total + PharmState.queue.length + 1)) * 100) : 0;

  app.innerHTML = `
    <div class="topbar">
      <div class="back-row">
        <button class="back-btn" id="btn-pharm-exit"><span>&#8249;</span> Home</button>
      </div>
    </div>
    <main>
      <div class="pharm-view pharm-root">
        <header>
          <div class="logo">Pharm Drill<span>EMS Pharmacology Practice</span></div>
          <div class="score-pill" id="pharm-score-pill"><strong>${PharmState.correct}</strong> / ${PharmState.total} correct</div>
        </header>

        <div class="tabs">
          <button class="tab ${PharmState.mode==='adult'?'active':''}" data-mode="adult" id="pharm-tab-adult">Adult Doses</button>
          <button class="tab ${PharmState.mode==='peds'?'active':''}" data-mode="peds" id="pharm-tab-peds">Peds Doses</button>
          <button class="tab ${PharmState.mode==='both'?'active':''}" data-mode="both" id="pharm-tab-both">Mixed</button>
        </div>

        <div class="progress-track"><div class="progress-fill ${PharmState.mode==='both'?'both':PharmState.mode}" style="width:${pct}%;"></div></div>

        <div class="stats">
          <div class="stat"><span class="val">${PharmState.correct}</span><span class="lbl">Correct</span></div>
          <div class="stat"><span class="val">${PharmState.wrong}</span><span class="lbl">Missed</span></div>
          <div class="stat"><span class="val">${PharmState.streak}</span><span class="lbl">Streak</span></div>
        </div>

        <div class="card ${cm}-mode" id="pharm-card">
          <div class="dose-label ${PharmState.mode==='both'?'both':cm}"><span class="dot"></span><span>${cm==='adult'?'Adult Dose':'Pediatric Dose'}</span></div>
          <div class="drug-name">${escapeHtml(cur.med.name)}</div>
          <div class="question">${cm==='adult' ? 'What is the adult dose, and how is it packaged?' : 'What is the pediatric dose, and how is it packaged?'}</div>
        </div>

        <div class="answer-row pharm-answer-stack">
          <input class="${answered ? (revealed ? 'ans-input err' : (PharmState._lastOk ? 'ans-input ok' : 'ans-input err')) : 'ans-input'}" id="pharm-ans" type="text" placeholder="Enter dose&hellip;" autocomplete="off" ${answered ? 'disabled' : ''} value="">
          <input class="${answered ? (revealed ? 'ans-input err' : (PharmState._lastPkgOk ? 'ans-input ok' : 'ans-input err')) : 'ans-input'}" id="pharm-pkg-ans" type="text" placeholder="Enter packaging&hellip;" autocomplete="off" ${answered ? 'disabled' : ''} value="">
          <button class="check-btn" id="pharm-check-btn">Check</button>
        </div>

        <div class="${answered ? (revealed ? 'feedback err' : (PharmState._lastOk && PharmState._lastPkgOk ? 'feedback ok' : 'feedback err')) : 'feedback'}" id="pharm-fb">
          ${answered ? (
            revealed
              ? `<span class="fb-icon">&#128065;</span><span>Dose: <span class="ans-text">${escapeHtml(ans)}</span><br>Packaging: <span class="ans-text">${escapeHtml(cur.med.pkg)}</span></span>`
              : (PharmState._lastOk && PharmState._lastPkgOk
                  ? `<span class="fb-icon">&#10003;</span><span>Correct &mdash; <span class="ans-text">${escapeHtml(ans)}</span>, packaged <span class="ans-text">${escapeHtml(cur.med.pkg)}</span></span>`
                  : `<span class="fb-icon">&#10005;</span><span>${PharmState._lastOk ? 'Dose correct' : 'Dose incorrect'} (<span class="ans-text">${escapeHtml(ans)}</span>) &mdash; ${PharmState._lastPkgOk ? 'packaging correct' : 'packaging incorrect'} (<span class="ans-text">${escapeHtml(cur.med.pkg)}</span>)</span>`)
          ) : `<span class="fb-icon">&#128138;</span><span>Type the dose and packaging above and press Check &mdash; or hit Enter.</span>`}
        </div>

        <div class="controls">
          <button class="ctrl" id="pharm-reveal-btn">Reveal</button>
          <button class="ctrl" id="pharm-skip-btn">Skip</button>
          <button class="ctrl next" id="pharm-next-btn" ${answered ? '' : 'disabled'}>Next &rarr;</button>
        </div>

        <div class="ref-section">
          <button class="ref-toggle-btn" id="pharm-ref-toggle">
            <i class="chevron ${PharmState.refOpen ? 'open' : ''}">&#9658;</i> Reference table
          </button>
          <div class="ref-wrap ${PharmState.refOpen ? 'open' : ''}">
            <table>
              <thead><tr><th>Medication</th><th>Adult</th><th>Pediatric</th><th>Packaging</th></tr></thead>
              <tbody>${pharmBuildRefRows()}</tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  `;

  document.getElementById('btn-pharm-exit').addEventListener('click', goHome);
  document.getElementById('pharm-tab-adult').addEventListener('click', () => pharmSetMode('adult'));
  document.getElementById('pharm-tab-peds').addEventListener('click', () => pharmSetMode('peds'));
  document.getElementById('pharm-tab-both').addEventListener('click', () => pharmSetMode('both'));
  document.getElementById('pharm-check-btn').addEventListener('click', pharmCheckWrapper);
  document.getElementById('pharm-reveal-btn').addEventListener('click', pharmReveal);
  document.getElementById('pharm-skip-btn').addEventListener('click', pharmSkip);
  document.getElementById('pharm-next-btn').addEventListener('click', pharmNext);
  document.getElementById('pharm-ref-toggle').addEventListener('click', () => {
    PharmState.refOpen = !PharmState.refOpen;
    renderPharm();
  });

  const ansInput = document.getElementById('pharm-ans');
  const pkgInput = document.getElementById('pharm-pkg-ans');
  if(!answered){
    ansInput.focus();
    ansInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') pkgInput.focus(); });
    pkgInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') pharmCheckWrapper(); });
  }
}

function pharmCheckWrapper(){
  if(PharmState.answered){ pharmNext(); return; }
  const inp = document.getElementById('pharm-ans');
  const pkgInp = document.getElementById('pharm-pkg-ans');
  if(!inp || !pkgInp) return;
  const val = inp.value.trim();
  const pkgVal = pkgInp.value.trim();
  if(!val || !pkgVal) return;
  const ans = pharmGetAnswer();
  const ok = pharmFuzzy(val, ans);
  const pkgOk = pharmFuzzyPkg(pkgVal, PharmState.cur.med.pkg);
  PharmState.answered = true; PharmState.total++;
  PharmState._lastOk = ok;
  PharmState._lastPkgOk = pkgOk;
  PharmState._revealed = false;
  if(ok && pkgOk){ PharmState.correct++; PharmState.streak++; }
  else{ PharmState.wrong++; PharmState.streak = 0; }
  renderPharm();
}

// ============================================================
// MAIN RENDER DISPATCHER
// ============================================================
function render(){
  if(State.view === 'home') renderHome();
  else if(State.view === 'drill') renderDrill();
  else if(State.view === 'summary') renderSummary();
  else if(State.view === 'walk') renderWalk();
  else if(State.view === 'pharm') renderPharm();
  else renderHome();
}

render();
</script>
</body>
</html>
